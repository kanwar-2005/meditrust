<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medi-Guard | Secure Node Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-cyan: #00f2ff;
            --emerald-glow: #10b981;
            --neural-purple: #8b5cf6;
            --deep-slate: #020617;
            --glass-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--deep-slate);
            color: #f8fafc;
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Grid Background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        /* Sidebar Styling */
        aside {
            width: 280px;
            background: rgba(7, 10, 25, 0.9);
            border-right: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            position: fixed;
            height: 100vh;
            z-index: 50;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .brand-logo {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: -1px;
            margin-bottom: 50px;
            padding-left: 15px;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo .dot {
            width: 8px;
            height: 8px;
            background: var(--primary-cyan);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary-cyan);
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 18px;
            border-radius: 16px;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .nav-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
        }

        .nav-link.active {
            background: rgba(0, 242, 255, 0.08);
            border: 1px solid rgba(0, 242, 255, 0.2);
            color: var(--primary-cyan);
            box-shadow: 0 10px 30px -10px rgba(0, 242, 255, 0.15);
        }

        .nav-link svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .nav-link.active svg {
            transform: scale(1.1);
            filter: drop-shadow(0 0 5px var(--primary-cyan));
        }

        /* Main Content Area */
        main {
            flex: 1;
            margin-left: 280px;
            padding: 60px;
            max-width: 1600px;
        }

        /* Responsive Breakpoints */
        @media (max-width: 1024px) {
            aside {
                width: 85px;
                padding: 40px 10px;
                align-items: center;
            }
            aside h2, .nav-link span {
                display: none;
            }
            .brand-logo { padding-left: 0; justify-content: center; }
            main { margin-left: 85px; padding: 40px 20px; }
            .nav-link { padding: 15px; justify-content: center; }
        }

        /* Utility Glows */
        .cyan-glow { color: var(--primary-cyan); text-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }
    </style>
</head>
<body>

    <aside>
        <div class="brand-logo">
            <div class="dot"></div>
            <h2>MEDI<span class="cyan-glow">GUARD</span></h2>
        </div>

        <nav class="flex-1">
            <a href="/seller/dashboard" class="nav-link {{ 'active' if request.path == '/seller/dashboard' }}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                <span>Dashboard</span>
            </a>

            <a href="/seller/logs" class="nav-link {{ 'active' if request.path == '/seller/logs' }}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <span>Blockchain Logs</span>
            </a>

            <a href="/seller/analytics" class="nav-link {{ 'active' if request.path == '/seller/analytics' }}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                <span>Security Analytics</span>
            </a>

            <a href="/seller/settings" class="nav-link {{ 'active' if request.path == '/seller/settings' }}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span>System Settings</span>
            </a>
        </nav>

        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
            <a href="/logout" class="nav-link" style="color: #fca5a5; opacity: 0.8;">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                <span>Sign Out</span>
            </a>
        </div>
    </aside>

    <main>
        {% block content %}{% endblock %}
    </main>

</body>
</html>
